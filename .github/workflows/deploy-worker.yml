name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci --prefix worker

      - name: Verify Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRABBOX_CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Set CRABBOX_CLOUDFLARE_API_TOKEN or CLOUDFLARE_API_TOKEN before deploying."
            exit 1
          fi

      - name: Check
        run: |
          npm run format:check --prefix worker
          npm run lint --prefix worker
          npm run check --prefix worker
          npm test --prefix worker
          npm run build --prefix worker

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRABBOX_CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: worker
        run: |
          for attempt in 1 2 3; do
            npx wrangler deploy --config wrangler.jsonc && exit 0
            sleep $((attempt * 5))
          done
          npx wrangler deploy --config wrangler.jsonc

      - name: Verify deployment
        run: |
          response="$(
            curl --fail --silent --show-error \
              --retry 12 --retry-all-errors --retry-delay 5 --max-time 20 \
              https://crabbox.openclaw.ai/v1/health
          )"
          node -e '
            const value = JSON.parse(process.argv[1]);
            if (value.ok !== true || value.service !== "crabbox-coordinator") process.exit(1);
          ' "$response"
